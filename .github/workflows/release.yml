# Release build — DRAFT.
#
# Goal: produce a wheel that ships a fresh, self-contained TUI bundle
# (ui-tui/dist/entry.js) so `pip`/`uv tool install` yields a working
# `raven tui` with no source checkout and no npm build on the user's machine.
#
# This is the "self-maintaining" piece: every tagged release rebuilds
# entry.js from the current ui-tui/ source, so the packaged TUI can never drift
# behind the Python code. Do NOT commit dist/entry.js to git — it is a build
# artifact produced here.
#
# Trigger: push a version tag (v1.2.3) or run manually.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      # 1) Node toolchain to build the TUI bundle.
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      # 2) Build the self-contained bundle into ui-tui/dist/entry.js.
      #    esbuild bundles react/ink in — no node_modules ships in the wheel.
      - name: Build TUI bundle
        working-directory: ui-tui
        run: |
          npm ci
          npm run build
          test -f dist/entry.js  # fail fast if the bundle didn't land

      # 3) Build the wheel directly from the checkout so the freshly generated
      #    ui-tui/dist/entry.js is visible to Hatch's conditional build hook.
      #    Then build the sdist separately. A combined `uv build` first creates
      #    an sdist and then builds the wheel from that sdist, which drops this
      #    gitignored bundle before the wheel hook can include it.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Build wheel + sdist
        run: |
          uv build --wheel
          uv build --sdist

      # 4) Sanity gate: the wheel MUST contain the bundle and MUST NOT carry
      #    node_modules or ui-tui sources (keeps the wheel lean and the smoke honest).
      - name: Verify wheel contents
        run: |
          python3 - <<'PY'
          import glob, sys, zipfile
          whl = sorted(glob.glob("dist/*.whl"))[-1]
          names = zipfile.ZipFile(whl).namelist()
          assert "raven/ui-tui/dist/entry.js" in names, "entry.js missing from wheel"
          assert not any("node_modules" in n for n in names), "node_modules leaked into wheel"
          # The only ui-tui/ entry must be the bundle — no TS source, no stray files.
          ui = [n for n in names if "ui-tui/" in n]
          assert ui == ["raven/ui-tui/dist/entry.js"], f"unexpected ui-tui entries: {ui}"
          print(f"OK: {whl} ships only entry.js under ui-tui/, no node_modules")
          PY

      # 4b) Export the locked dependency set as a constraints file. The install
      #     scripts pass this to `uv tool install -c` so a one-click install gets
      #     the exact versions we lock and test, instead of re-resolving to the
      #     newest versions allowed by pyproject (which drifts, and can pull a
      #     source-only build with no wheel on the user's platform). --locked
      #     fails the release if uv.lock is stale vs pyproject, so we never ship
      #     constraints that conflict with the wheel's own metadata; --all-extras
      #     covers the channel SDKs behind raven[channels].
      - name: Export locked constraints
        run: uv export --locked --all-extras --no-hashes --no-emit-project -o dist/raven-constraints.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

      # 5) On a version tag, publish a DRAFT GitHub Release with the built
      #    wheel + sdist attached. install.sh resolves the wheel from the
      #    latest Release asset, so a human reviews the draft and clicks
      #    Publish to make it live. Manual dispatch (no tag) stops after the
      #    artifact upload above.
      - name: Check tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${{ github.ref_name }}"
          v=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          base="${tag#v}"; base="${base%%-*}"   # v0.1.3-rc1 -> 0.1.3
          [ "$base" = "$v" ] || { echo "tag $tag does not match pyproject version $v"; exit 1; }

      - name: Create draft GitHub Release with assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          repo="${{ github.repository }}"
          ver="${tag#v}"
          today="$(date -u +%Y-%m-%d)"
          # prerelease tags (contain a hyphen, e.g. v0.1.3-rc1) must never become
          # /releases/latest, which install.sh serves to curl|sh users.
          pre=""
          case "$tag" in *-*) pre="--prerelease" ;; esac
          # Prefill notes from the template; the summary and Highlights stay TODO
          # for a human to fill in the draft before publishing.
          sed "s/__VERSION__/$ver/g; s/__TAG__/$tag/g" \
            .github/release-notes-template.md > "$RUNNER_TEMP/notes.md"
          # Detect an existing release via the LIST endpoint: the tag endpoint is
          # published-only and the Actions token cannot see a draft through it
          # (cli/cli #3037), so a re-run would 422 on create. Delete a stale draft
          # (this keeps the git tag) and recreate; leave a published release alone.
          rel=$(gh api "repos/$repo/releases?per_page=100" --jq "map(select(.tag_name==\"$tag\"))[0] // {}")
          id=$(printf '%s' "$rel" | jq -r '.id // empty')
          isdraft=$(printf '%s' "$rel" | jq -r '.draft // false')
          if [ -n "$id" ] && [ "$isdraft" = "true" ]; then
            gh api -X DELETE "repos/$repo/releases/$id"
            id=""
          fi
          if [ -z "$id" ]; then
            gh release create "$tag" dist/*.whl dist/*.tar.gz dist/raven-constraints.txt \
              --title "Raven $ver ($today)" --notes-file "$RUNNER_TEMP/notes.md" --draft $pre
          else
            echo "Release $tag already published (id=$id); leaving as-is."
          fi

      # (Optional, wire up when ready) publish to PyPI on tag:
      # - name: Publish to PyPI
      #   if: startsWith(github.ref, 'refs/tags/v')
      #   run: uv publish
      #   env:
      #     UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
