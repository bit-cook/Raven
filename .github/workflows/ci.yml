name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: make install-deps

      - name: Run pre-commit on changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="$(git rev-list --max-parents=0 HEAD)"
          fi
          uv run pre-commit run --from-ref "$BASE" --to-ref HEAD

  python:
    name: python checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: make install-deps

      - name: Focused Python lint
        run: make lint-python

      - name: Focused Python tests
        run: make test-python

  tui:
    name: TUI checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui-tui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui-tui

      - name: Lint, type-check, and test
        run: |
          npm run lint
          npm run lint:rpc
          npm run type-check
          npm test
          npm run build
        working-directory: ui-tui

  bridge:
    name: bridge checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bridge/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: bridge

      - name: Build bridge
        run: npm run build
        working-directory: bridge

      - name: Audit bridge dependencies
        run: npm audit --audit-level=critical
        working-directory: bridge
